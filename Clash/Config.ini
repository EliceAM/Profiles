[custom]
# > Local Area Network
ruleset=DIRECT,https://raw.githubusercontent.com/EliceAM/Profiles/main/Clash/RuleSet/Lan.list

# > Unbreak
ruleset=DIRECT,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Unbreak.list

# > Guard
ruleset=🛑Guard,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Guard/Advertising.list
ruleset=🛑Guard,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Guard/Hijacking.list
ruleset=🛑Guard,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Guard/Privacy.list
ruleset=🛑Guard,https://raw.githubusercontent.com/EliceAM/Profiles/main/Clash/RuleSet/Reject.list

# > Direct
ruleset=DIRECT,https://raw.githubusercontent.com/EliceAM/Profiles/main/Clash/RuleSet/Direct.list

# > Google Search
ruleset=📢Google,[]DOMAIN-KEYWORD,www.google.
ruleset=📢Google,[]DOMAIN-SUFFIX,gstatic.com
# > Google Voice
ruleset=📢Google,[]DOMAIN,lens.l.google.com
# > Google 
ruleset=📢Google,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Extra/Google/GoogleDrive.list
ruleset=📢Google,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Extra/Google/Chromecast.list

# > Microsoft
ruleset=🖥️Microsoft,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Extra/Microsoft/Teams.list
ruleset=🖥️Microsoft,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Extra/Microsoft/OneDrive.list

# > IP limlt
ruleset=📌Manual,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/MEGA/MEGA.list

# > Telegram
ruleset=📱Telegram,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Extra/Telegram/Telegram.list

# > Steam
ruleset=DIRECT,https://raw.githubusercontent.com/EliceAM/Profiles/main/Clash/RuleSet/Steam-CDN.list
ruleset=🎮Steam,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Extra/Game/Steam.list

# > Console
ruleset=🕹️Console,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Nintendo/Nintendo.list
ruleset=🕹️Console,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Xbox/Xbox.list
ruleset=🕹️Console,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/PlayStation/PlayStation.list

# > PayPal
ruleset=💰PayPal,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Extra/PayPal.list

# > Spotify
ruleset=🎵Spotify,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/StreamingMedia/Music/Spotify.list

# > YouTube
ruleset=📹YouTube,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/StreamingMedia/Video/YouTube.list

# > Region
ruleset=🇯🇵JP,[]DOMAIN-SUFFIX,mora.jp
ruleset=🇯🇵JP,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/StreamingMedia/Region/JP.list

# > Emby
ruleset=🎬Emby,[]DOMAIN-SUFFIX,emby.wtf

# > Media
ruleset=🎥Streaming,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/StreamingMedia/Streaming.list
ruleset=📺StreamingSE,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/StreamingMedia/StreamingSE.list

# > Global
ruleset=🌍Global,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Global.list
ruleset=🌍Global,https://raw.githubusercontent.com/EliceAM/Profiles/main/Clash/RuleSet/Proxy.list
ruleset=🌍Global,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Nvidia/Nvidia.list

# > Apple
ruleset=🍎Apple,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Extra/Apple/Apple.list

# > China
ruleset=DIRECT,https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/China.list
ruleset=DIRECT,[]GEOIP,CN

ruleset=🚩Final,[]FINAL

### > custom_proxy_group

custom_proxy_group=🌍Global`select`[]🇭🇰HK`[]🇨🇳TW`[]🇸🇬SG`[]🇯🇵JP`[]🇺🇸US`[]🇪🇺EU
custom_proxy_group=📢Google`select`[]🇭🇰HK`[]🇸🇬SG`[]🇯🇵JP`[]🇺🇸US
custom_proxy_group=🖥️Microsoft`select`[]DIRECT`[]🌍Global
custom_proxy_group=📱Telegram`select`[]🇸🇬SG`[]🇺🇸US`[]🇪🇺EU
custom_proxy_group=🎮Steam`select`[]🇭🇰HK`[]DIRECT
custom_proxy_group=🕹️Console`select`[]🇭🇰HK`[]DIRECT
custom_proxy_group=📹YouTube`select`[]🇭🇰HK`[]🇸🇬SG`[]🇺🇸US
custom_proxy_group=🎵Spotify`select`[]DIRECT`[]🇯🇵JP
custom_proxy_group=🎬Emby`select`[]DIRECT`[]🇭🇰HK
custom_proxy_group=🎥Streaming`select`[]🇨🇳TW`[]🇭🇰HK`[]🇯🇵JP`[]🇺🇸US
custom_proxy_group=📺StreamingSE`select`[]DIRECT`[]🇨🇳TW`[]🇭🇰HK
custom_proxy_group=💰PayPal`select`[]🇺🇸US`[]DIRECT
custom_proxy_group=🍎Apple`select`[]DIRECT`[]🇺🇸US
custom_proxy_group=🛑Guard`select`[]REJECT`[]DIRECT
custom_proxy_group=🚩Final`select`[]DIRECT`[]🌍Global`[]📌Manual
custom_proxy_group=📌Manual`select`.*
;custom_proxy_group=♾️0.3`fallback`(?=.*(0.3))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇭🇰HK`url-test`(?=.*(🇭🇰|香港|HK|Hong))^((?!(0.3)).)*$`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇯🇵JP`url-test`(?=.*(🇯🇵|日本|JP|Japan))^((?!(0.3)).)*$`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇺🇸US`url-test`(?=.*(🇺🇸|美国|US|United States))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇨🇳TW`url-test`(?=.*(台湾|TW|Taiwan))`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇸🇬SG`url-test`(?=.*(🇸🇬|新加坡|SG|Singapore))^((?!(0.3)).)*$`http://cp.cloudflare.com/generate_204`600,,100
custom_proxy_group=🇪🇺EU`url-test`(?=.*(荷兰|NL|德国|DE|法国|FR|英国|UK))`http://www.gstatic.com/generate_204`600,,100


enable_rule_generator=true
overwrite_original_rules=true
clash_rule_base=https://raw.githubusercontent.com/EliceAM/Profiles/main/Clash/Outbound.yaml
